services:
  postgres:
    image: postgres:16-alpine
    container_name: enrichleads_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-enrichleads}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-enrichleads}
      POSTGRES_DB: ${POSTGRES_DB:-enrichleads}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
